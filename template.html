<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- TOP PANEL -->
<div id="top-panel">
  <!-- Start row -->
  <div class="search-row">
    <div class="search-dot start"></div>
    <div class="search-wrap">
      <input class="search-input" id="start-input" placeholder="Start — search address or click map..." autocomplete="off">
      <div class="autocomplete-list" id="start-list"></div>
    </div>
    <button class="pick-btn" id="pick-start" title="Click map to set start">📍 Pick</button>
  </div>
  <!-- End row -->
  <div class="search-row">
    <div class="search-dot end"></div>
    <div class="search-wrap">
      <input class="search-input" id="end-input" placeholder="End — search address or click map..." autocomplete="off">
      <div class="autocomplete-list" id="end-list"></div>
    </div>
    <button class="pick-btn" id="pick-end" title="Click map to set end">📍 Pick</button>
  </div>
</div>

<!-- IDE TOGGLE BUTTON -->
<button id="ide-toggle" title="Toggle IDE panel">&lt;/&gt;</button>

<!-- IDE PANEL -->
<div id="ide-panel">
  <!-- Header -->
  <div id="ide-header">
    <span id="ide-title">ALGORITHM EDITOR</span>
    <div id="ide-header-right">
      <input type="password" id="api-key-input" placeholder="Anthropic API Key" autocomplete="off" spellcheck="false">
      <button id="ide-close" title="Close IDE">&times;</button>
    </div>
  </div>

  <!-- Tab bar -->
  <div id="ide-tabs">
    <button class="ide-tab active" data-lang="javascript">JavaScript</button>
    <button class="ide-tab" data-lang="python">Python</button>
    <button class="ide-tab" data-lang="cpp">C++</button>
  </div>

  <!-- Editor containers (one per language) -->
  <div id="ide-editor-wrap">
    <div class="ide-editor-pane active" id="editor-javascript"></div>
    <div class="ide-editor-pane" id="editor-python"></div>
    <div class="ide-editor-pane" id="editor-cpp"></div>
  </div>

  <!-- Run button -->
  <div id="ide-toolbar">
    <button id="ide-run">&#9654; RUN</button>
  </div>

  <!-- Terminal -->
  <div id="ide-terminal-wrap">
    <div id="ide-terminal-header">
      <span>TERMINAL</span>
      <button id="ide-terminal-clear">Clear</button>
    </div>
    <div id="ide-terminal"></div>
  </div>
</div>

<!-- BOTTOM CONTROLS -->
<div id="astar-controls">
  <button id="btn-play"  title="Play">&#9654;</button>
  <button id="btn-pause" title="Pause">&#10074;&#10074;</button>
  <button id="btn-reset" title="Reset">&#9632;</button>
  <div id="astar-progress"><div id="astar-progress-bar"></div></div>
  <span id="astar-status">SET START &amp; END TO BEGIN</span>
  <span style="font-size:10px;color:var(--muted);">SPD</span>
  <input type="range" id="astar-speed" min="1" max="100" value="30">
  <button id="btn-theme" title="Toggle theme">🌙</button>
</div>
